    <script>
        $(function()
        {
            $("#but").click(function()
            {
                document.theForm.submit();
                $("#but").attr("disabled", "disabled");
                setTimeout(function()
                {
                    $("#but").removeAttr("disabled");
                }, 10000);
            });
        });
    </script>
